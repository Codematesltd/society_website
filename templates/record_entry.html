<h2 class="text-2xl font-bold text-blue-700 mb-6">Historical Data Record Entry</h2>

<!-- Search Customer -->
<div class="bg-blue-50 p-6 rounded-xl shadow mb-6 border border-blue-100">
  <label class="block font-semibold mb-2 text-gray-700">Enter Customer ID:</label>
  <div class="flex gap-4">
    <input type="text" id="reSearchCustomerId" placeholder="Customer ID (e.g. CUST001)" class="w-full md:w-1/3 px-4 py-2 border rounded shadow-sm focus:ring focus:ring-blue-200">
    <button type="button" id="reFetchBtn" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 transition">Fetch</button>
  </div>
  <div id="reFetchMsg" class="text-sm mt-2 font-medium"></div>
</div>

<!-- Main Form (Hidden initially) -->
<form id="recordEntryForm" class="hidden space-y-8">
  
  <!-- Previous and Existing Data -->
  <div class="bg-white p-6 rounded-xl shadow border">
    <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">Previous & Existing Data</h3>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
      <div>
        <label class="block font-medium text-gray-700 mb-1">Customer Name (Read-only)</label>
        <input type="text" id="reCustomerName" class="w-full px-4 py-2 border rounded bg-gray-100 font-medium" readonly>
      </div>
      <div>
        <label class="block font-medium text-gray-700 mb-1">Share Amount</label>
        <div class="relative">
          <span class="absolute left-3 top-2 text-gray-500">₹</span>
          <input type="number" id="reShareAmount" class="w-full pl-8 pr-4 py-2 border rounded" min="0" step="0.01">
        </div>
      </div>
      <div>
        <label class="block font-medium text-gray-700 mb-1">Share Fees</label>
        <div class="relative">
          <span class="absolute left-3 top-2 text-gray-500">₹</span>
          <input type="number" id="reShareFees" class="w-full pl-8 pr-4 py-2 border rounded" min="0" step="0.01">
        </div>
      </div>
      <div>
        <label class="block font-medium text-gray-700 mb-1">Current Balance</label>
        <div class="relative">
          <span class="absolute left-3 top-2 text-gray-500">₹</span>
          <input type="number" id="reBalance" class="w-full pl-8 pr-4 py-2 border rounded" min="0" step="0.01">
        </div>
      </div>
    </div>
  </div>

  <!-- Historic Loan Section -->
  <div class="bg-white p-6 rounded-xl shadow border">
    <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4 text-purple-700">Loan Section</h3>
    
    <div class="mb-4">
      <label class="block font-semibold mb-2">Select Loan Type:</label>
      <div class="flex gap-6">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="reLoanType" value="normal" class="form-radio text-purple-600 focus:ring-purple-500"> 
          <span class="text-gray-800 font-medium">Salaried Loan</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="reLoanType" value="emergency" class="form-radio text-purple-600 focus:ring-purple-500"> 
          <span class="text-gray-800 font-medium">Emergency Loan</span>
        </label>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div>
        <label class="block font-medium mb-1">Loan ID <span class="text-sm text-gray-500">(If available)</span></label>
        <input type="text" id="reLoanId" class="w-full px-4 py-2 border rounded" placeholder="e.g. LN001">
      </div>
      <div>
        <label class="block font-medium mb-1">Loan Amount</label>
        <div class="relative">
          <span class="absolute left-3 top-2 text-gray-500">₹</span>
          <input type="number" id="reLoanAmount" class="w-full pl-8 pr-4 py-2 border rounded" min="0">
        </div>
      </div>
      <div>
        <label class="block font-medium mb-1">Loan Interest (%)</label>
        <div class="relative">
          <input type="number" id="reLoanInterest" class="w-full pr-8 pl-4 py-2 border rounded" step="0.01">
          <span class="absolute right-3 top-2 text-gray-500">%</span>
        </div>
      </div>
      <div>
        <label class="block font-medium mb-1">Loan Date</label>
        <input type="date" id="reLoanDate" class="w-full px-4 py-2 border rounded">
      </div>
    </div>

    <!-- Sureties -->
    <div class="mb-6">
      <label class="block font-semibold mb-2">Surety Details:</label>
      <div class="space-y-4">
        <!-- Surety 1 -->
        <div class="bg-gray-50 p-4 rounded-xl shadow-sm border border-gray-200" id="reSurety1Box">
          <div class="flex gap-2 mb-2">
            <input type="text" id="reSurety1Id" placeholder="Enter Surety 1 Customer ID" class="px-4 py-2 border rounded flex-1">
            <button type="button" id="reCheckSurety1Btn" class="bg-purple-600 text-white px-4 py-2 rounded shadow hover:bg-purple-700 transition">Check</button>
            <button type="button" id="reRemoveSurety1Btn" class="bg-red-500 text-white px-4 py-2 rounded hidden transition">Remove</button>
          </div>
          <span id="reSurety1Msg" class="text-sm font-medium block mb-2"></span>
          <div id="reSurety1Fields" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>

        <!-- Surety 2 -->
        <div class="bg-gray-50 p-4 rounded-xl shadow-sm border border-gray-200" id="reSurety2Box">
          <div class="flex gap-2 mb-2">
            <input type="text" id="reSurety2Id" placeholder="Enter Surety 2 Customer ID" class="px-4 py-2 border rounded flex-1">
            <button type="button" id="reCheckSurety2Btn" class="bg-purple-600 text-white px-4 py-2 rounded shadow hover:bg-purple-700 transition">Check</button>
            <button type="button" id="reRemoveSurety2Btn" class="bg-red-500 text-white px-4 py-2 rounded hidden transition">Remove</button>
          </div>
          <span id="reSurety2Msg" class="text-sm font-medium block mb-2"></span>
          <div id="reSurety2Fields" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
      </div>
    </div>

    <!-- Loan Repayment Progress -->
    <div class="bg-purple-50 p-4 rounded-xl border border-purple-200">
      <h4 class="font-bold text-purple-900 mb-3">Installment Paid Until Now:</h4>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block font-medium text-sm mb-1 text-purple-800">Principal Paid</label>
          <div class="relative">
            <span class="absolute left-3 top-2 text-purple-500">₹</span>
            <input type="number" id="rePrinPaid" class="w-full pl-8 pr-4 py-2 border rounded focus:ring-purple-200" min="0" value="0">
          </div>
        </div>
        <div>
          <label class="block font-medium text-sm mb-1 text-purple-800">Interest Paid</label>
          <div class="relative">
            <span class="absolute left-3 top-2 text-purple-500">₹</span>
            <input type="number" id="reIntPaid" class="w-full pl-8 pr-4 py-2 border rounded focus:ring-purple-200" min="0" value="0">
          </div>
        </div>
        <div>
          <label class="block font-medium text-sm mb-1 text-purple-800">Date Last Paid</label>
          <input type="date" id="reDatePaid" class="w-full px-4 py-2 border rounded focus:ring-purple-200">
        </div>
        <div>
          <label class="block font-bold text-sm mb-1 text-purple-900">Remaining Amount</label>
          <div class="relative">
            <span class="absolute left-3 top-2 text-gray-500 font-bold">₹</span>
            <input type="text" id="reRemAmount" class="w-full pl-8 pr-4 py-2 border rounded bg-gray-200 font-bold text-gray-700" readonly placeholder="0.00">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Historic FD Section -->
  <div class="bg-white p-6 rounded-xl shadow border">
    <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4 text-green-700">Fixed Deposit Section</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div>
        <label class="block font-medium mb-1">FD ID <span class="text-sm text-gray-500">(If available)</span></label>
        <input type="text" id="reFdId" class="w-full px-4 py-2 border rounded" placeholder="e.g. FD001">
      </div>
      <div>
        <label class="block font-medium mb-1">Amount of FD</label>
        <div class="relative">
          <span class="absolute left-3 top-2 text-gray-500">₹</span>
          <input type="number" id="reFdAmount" class="w-full pl-8 pr-4 py-2 border rounded" min="0">
        </div>
      </div>
      <div>
        <label class="block font-medium mb-1">Interest of FD (%)</label>
        <div class="relative">
          <input type="number" id="reFdInterest" class="w-full pr-8 pl-4 py-2 border rounded" step="0.01">
          <span class="absolute right-3 top-2 text-gray-500">%</span>
        </div>
      </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block font-medium mb-1">Date of FD Registered</label>
        <input type="date" id="reFdRegDate" class="w-full px-4 py-2 border rounded">
      </div>
      <div>
        <label class="block font-medium mb-1">Maturity Date</label>
        <input type="date" id="reFdMatDate" class="w-full px-4 py-2 border rounded">
      </div>
    </div>

    <div>
      <label class="block font-medium mb-1">Nominee Details</label>
      <input type="text" id="reFdNominee" class="w-full px-4 py-2 border rounded" placeholder="Name, Relationship, Age">
    </div>
  </div>

  <!-- Submit -->
  <div class="flex justify-end pb-10">
    <button type="submit" id="reSaveBtn" class="bg-green-600 text-white font-bold px-10 py-3 rounded-lg shadow-lg hover:bg-green-700 transition transform hover:scale-105">
      Save Record Entry
    </button>
  </div>
</form>
